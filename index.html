<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
   <script src="https://cdn.jsdelivr.net/npm/qz-tray@2.2.5/qz-tray.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    qz.security.setCertificatePromise(function(resolve, reject) {
      fetch("/certificate.pem")
        .then(function(r) { return r.text(); })
        .then(function(text) {
          console.log("Certificado cargado:", text.substring(0, 50));
          resolve(text);
        })
        .catch(reject);
    });

    qz.security.setSignatureAlgorithm("SHA512");

 qz.security.setSignaturePromise(async function(toSign) {
  const response = await fetch("http://localhost:3001/api/sign", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ toSign: toSign })
  });
  const data = await response.json();
  console.log("Firma recibida:", data.signature.substring(0, 20));
  return data.signature;
});

    console.log("QZ Tray configurado");
  });
</script>
    </body>
    
    </html>
